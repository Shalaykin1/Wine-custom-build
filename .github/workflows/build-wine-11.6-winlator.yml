name: build-wine-11.6-winlator

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-wine-11.6-winlator.yml'
      - 'scripts/**'
      - 'Makefile'
      - 'README.md'
  workflow_dispatch:
    inputs:
      variant:
        description: Which Winlator build to produce
        required: true
        default: all
        type: choice
        options:
          - all
          - x64-x86
          - arm64ec
      wine_ref:
        description: Upstream Wine tag or branch
        required: true
        default: wine-11.6

permissions:
  contents: write

jobs:
  build-x64-x86:
    if: ${{ github.event_name == 'push' || github.event.inputs.variant == 'all' || github.event.inputs.variant == 'x64-x86' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Install dependencies
        run: ./scripts/install-build-deps.sh

      - name: Build Wine x64/x86
        env:
          WINE_REF: ${{ github.event.inputs.wine_ref || 'wine-11.6' }}
        run: ./scripts/build-winlator-wine.sh x64-x86

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wine-x64-x86
          path: |
            dist/wine-*-x64-x86.tar.xz
            dist/wine-*-x64-x86.wcp

  build-arm64ec:
    if: ${{ github.event_name == 'push' || github.event.inputs.variant == 'all' || github.event.inputs.variant == 'arm64ec' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Install dependencies
        run: ./scripts/install-build-deps.sh

      - name: Build Wine arm64ec
        env:
          WINE_REF: ${{ github.event.inputs.wine_ref || 'wine-11.6' }}
        run: ./scripts/build-winlator-wine.sh arm64ec

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wine-arm64ec
          path: |
            dist/wine-*-arm64ec.tar.xz
            dist/wine-*-arm64ec.wcp

  publish-release:
    if: ${{ github.event_name == 'push' || github.event.inputs.variant == 'all' }}
    runs-on: ubuntu-24.04
    needs:
      - build-x64-x86
      - build-arm64ec
    steps:
      - name: Download x64/x86 artifacts
        uses: actions/download-artifact@v4
        with:
          name: wine-x64-x86
          path: release-assets

      - name: Download arm64ec artifacts
        uses: actions/download-artifact@v4
        with:
          name: wine-arm64ec
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wine-11.6-winlator-cmod
          name: Wine 11.6 for Winlator CMOD
          body: |
            Automated Wine 11.6 build for Winlator CMOD (StevenMXZ).

            Included variants:
            - x64/x86 (WoW64)
            - arm64ec
          files: |
            release-assets/*.tar.xz
            release-assets/*.wcp
          overwrite_files: true
          make_latest: true
